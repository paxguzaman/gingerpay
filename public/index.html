<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" id="themeColorMeta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GingerPay — Fast. Secure. Effortless.</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='700' font-family='serif' fill='%23F59E0B'>G</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-ambient" aria-hidden="true">
    <div class="orb orb-gold"></div>
    <div class="orb orb-blue"></div>
  </div>

  <!-- ── NAVBAR ───────────────────────────── -->
  <header class="navbar" role="banner">
    <a href="#" class="nav-brand" aria-label="GingerPay home">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#F59E0B"/>
              <stop offset="100%" stop-color="#FCD34D"/>
            </linearGradient>
          </defs>
          <!-- G base -->
          <path d="M22 8.5C19.8 6.3 16.8 5 13.5 5C7.7 5 3 9.7 3 15.5C3 21.3 7.7 26 13.5 26C18.8 26 23.2 22.3 24 17H14V13H27V15.5C27 22.9 20.9 29 13.5 29C6.1 29 0 22.9 0 15.5C0 8.1 6.1 2 13.5 2C17.1 2 20.4 3.4 22.8 5.7L22 8.5Z" fill="url(#g1)" transform="scale(0.6) translate(3,1)"/>
          <!-- Lightning bolt -->
          <path d="M16 3L12 11H15.5L11 19L21 9H17L16 3Z" fill="url(#g1)" transform="scale(0.75) translate(1.5, 0)"/>
        </svg>
      </div>
      <span class="brand-name">Ginger<span>Pay</span></span>
    </a>

    <button class="theme-btn" id="themeToggle" aria-label="Toggle light/dark mode">
      <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeLabel">Light</span>
    </button>
  </header>

  <!-- ── MAIN CONTENT ─────────────────────── -->
  <main class="main">

    <!-- Hero strip -->
    <section class="hero" aria-labelledby="heroTitle">
      <div class="hero-ping" aria-hidden="true">
        <div class="ping-ring r1"></div>
        <div class="ping-ring r2"></div>
        <div class="ping-ring r3"></div>
        <svg class="ping-phone" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="2" width="28" height="36" rx="5" stroke="#F59E0B" stroke-width="1.5" fill="rgba(245,158,11,0.05)"/>
          <rect x="11" y="8" width="18" height="20" rx="2" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
          <circle cx="20" cy="34" r="1.5" fill="#F59E0B" opacity="0.6"/>
          <path d="M14 18L20 15L26 18" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9"/>
          <path d="M14 21L20 18L26 21" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.55"/>
          <path d="M14 24L20 21L26 24" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.25"/>
        </svg>
      </div>

      <div class="hero-text">
        <h1 class="hero-title" id="heroTitle"><span>Ginger</span>Pay</h1>
        <p class="hero-tagline">Fast &amp; secure M-Pesa payments</p>
      </div>

      <p class="hero-desc">
        Enter your details below — we'll send an M-Pesa prompt to your phone.
      </p>
    </section>

    <!-- Payment card -->
    <section class="card-wrap" aria-labelledby="cardTitle" id="payment">
      <div class="card">
        <div class="card-stripe" aria-hidden="true"></div>

        <div class="card-inner">
          <!-- Card header -->
          <div class="card-head">
            <h2 class="card-title" id="cardTitle">Complete Payment</h2>
            <div class="badge-row" role="list" aria-label="Security indicators">
              <span class="badge" role="listitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                SSL
              </span>
              <span class="badge badge-blue" role="listitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                M-Pesa
              </span>
              <span class="badge badge-gold" role="listitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                Instant
              </span>
            </div>
          </div>

          <div class="card-divider" aria-hidden="true"></div>

          <!-- Amount field -->
          <div class="field">
            <label class="field-label" for="amountInput">Amount</label>
            <div class="field-input-wrap">
              <div class="field-prefix" aria-hidden="true">KES</div>
              <input
                class="field-input"
                type="text"
                id="amountInput"
                name="amount"
                placeholder="0"
                autocomplete="off"
                inputmode="numeric"
                pattern="[0-9]*"
                aria-required="true"
                aria-describedby="amountHint amountError"
              />
              <div class="field-icon" id="amountIcon" aria-hidden="true"></div>
            </div>
            <span class="field-hint" id="amountHint">Minimum KES 1</span>
            <span class="field-error hidden" id="amountError" role="alert"></span>
          </div>

          <!-- Phone field -->
          <div class="field">
            <label class="field-label" for="phoneInput">M-Pesa Number</label>
            <div class="field-input-wrap">
              <div class="field-prefix phone-prefix" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
              </div>
              <input
                class="field-input"
                type="tel"
                id="phoneInput"
                name="phone"
                placeholder="07XX · 01XX · 2547XX"
                autocomplete="tel"
                inputmode="tel"
                aria-required="true"
                aria-describedby="phoneHint phoneError"
              />
              <div class="field-icon" id="phoneIcon" aria-hidden="true"></div>
            </div>
            <span class="field-hint" id="phoneHint">Safaricom M-Pesa number</span>
            <span class="field-error hidden" id="phoneError" role="alert"></span>
          </div>

          <!-- Pay button -->
          <button class="pay-btn" id="payBtn" type="button">
            <span class="pay-btn-icon" id="btnIconWrap" aria-hidden="true">
              <svg id="btnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
                <path d="M8.5 7 Q12 5.5 15.5 7" stroke-width="1.5"/>
                <circle cx="12" cy="15" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            <span class="spinner hidden" id="btnSpinner" role="status" aria-label="Processing"></span>
            <span class="pay-btn-text" id="btnText">Pay with M-Pesa</span>
          </button>

        </div><!-- /card-inner -->
      </div><!-- /card -->

      <!-- Status section (revealed after pay) -->
      <div class="status-wrap hidden" id="statusSection" aria-live="polite" aria-atomic="true">
        <div class="status-card" id="statusCard"></div>
      </div>

    </section><!-- /card-wrap -->

    <!-- Trust row -->
    <footer class="trust-row" aria-label="Trust indicators">
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        256-bit SSL
      </div>
      <div class="trust-dot" aria-hidden="true"></div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Instant
      </div>
      <div class="trust-dot" aria-hidden="true"></div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        No Fees
      </div>
    </footer>

    <p class="footer-credit">created by <span class="glow-name">Gingersketchy</span></p>

  </main>

  <script src="app.js"></script>
</body>
</html>
